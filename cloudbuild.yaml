# Cloud Build: Create .env from Secret Manager, build frontend, then Docker build
# Requires secrets in Secret Manager: VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN,
# VITE_FIREBASE_PROJECT_ID, VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID, VITE_FIREBASE_APP_ID

steps:
  # Step 1: Create .env from Secret Manager (Firebase config for client bundle)
  - name: 'bash'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        {
          echo "VITE_FIREBASE_API_KEY=$$VITE_FIREBASE_API_KEY"
          echo "VITE_FIREBASE_AUTH_DOMAIN=$$VITE_FIREBASE_AUTH_DOMAIN"
          echo "VITE_FIREBASE_PROJECT_ID=$$VITE_FIREBASE_PROJECT_ID"
          echo "VITE_FIREBASE_STORAGE_BUCKET=$$VITE_FIREBASE_STORAGE_BUCKET"
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$$VITE_FIREBASE_MESSAGING_SENDER_ID"
          echo "VITE_FIREBASE_APP_ID=$$VITE_FIREBASE_APP_ID"
        } > .env
    secretEnv:
      - VITE_FIREBASE_API_KEY
      - VITE_FIREBASE_AUTH_DOMAIN
      - VITE_FIREBASE_PROJECT_ID
      - VITE_FIREBASE_STORAGE_BUCKET
      - VITE_FIREBASE_MESSAGING_SENDER_ID
      - VITE_FIREBASE_APP_ID

  # Step 2: npm install + npm run build (Vite reads .env, embeds Firebase keys in dist/)
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install --legacy-peer-deps
        npm run build

  # Step 3: Docker build (copies pre-built dist)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/factchecker:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/factchecker:latest'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/factchecker:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/factchecker:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: VITE_FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest
      env: VITE_FIREBASE_AUTH_DOMAIN
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest
      env: VITE_FIREBASE_PROJECT_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_STORAGE_BUCKET/versions/latest
      env: VITE_FIREBASE_STORAGE_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: VITE_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_APP_ID/versions/latest
      env: VITE_FIREBASE_APP_ID
